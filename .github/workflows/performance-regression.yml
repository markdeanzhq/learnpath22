name: Performance regression checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  performance:
    name: Backend and frontend performance gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run performance regression gates
        env:
          PERF_BASELINE_REPEAT: '2'
          PERF_BASELINE_WARMUP: '1'
          BUNDLE_TOTAL_GZIP_KB: '650'
          BUNDLE_ASSET_GZIP_KB: '250'
          BUNDLE_GRAPH_VENDOR_GZIP_KB: '180'
        run: python scripts/perf_baseline.py
